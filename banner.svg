<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Satellite Health Monitor banner">
  <defs>
    <radialGradient id="earthGlow" cx="30%" cy="70%" r="75%">
      <stop offset="0%" stop-color="#123049"/>
      <stop offset="55%" stop-color="#0C2233"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="80%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#0F1826"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bgGlow)"/>

  <!-- faint telemetry grid -->
  <g stroke="#17222F" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/>
    <line x1="750" y1="0" x2="750" y2="320"/>
    <line x1="1050" y1="0" x2="1050" y2="320"/>
  </g>

  <!-- scattered telemetry data points (TLE catalogue) -->
  <g fill="#4FD8E8">
    <circle cx="640" cy="70" r="2"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="710" cy="130" r="1.6"><animate attributeName="opacity" values="0.9;0.15;0.9" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="90" r="2.2"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="160" r="1.6"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="60" r="2"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="1030" cy="120" r="1.8"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="180" r="2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.9s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="70" r="1.6"><animate attributeName="opacity" values="0.85;0.15;0.85" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="180" r="1.8"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="4.3s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="250" r="1.6"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Earth limb -->
  <circle cx="60" cy="380" r="260" fill="url(#earthGlow)" stroke="#1E3A52" stroke-width="1.5"/>
  <circle cx="60" cy="380" r="260" fill="none" stroke="#4FD8E8" stroke-width="1" opacity="0.35"/>

  <!-- orbit path -->
  <ellipse cx="60" cy="380" rx="330" ry="330" fill="none" stroke="#2B4256" stroke-width="1" stroke-dasharray="2 6" opacity="0.6"/>

  <!-- orbit trail (partial arc, fading) -->
  <path d="M 300 90 A 330 330 0 0 1 388 148" fill="none" stroke="#4FD8E8" stroke-width="1.5" opacity="0.5"/>

  <!-- satellite riding the orbit -->
  <g>
    <g id="sat">
      <rect x="-3.5" y="-8" width="7" height="7" rx="1" fill="#E6EDF3"/>
      <rect x="-14" y="-6" width="9" height="3" fill="#4FD8E8"/>
      <rect x="5" y="-6" width="9" height="3" fill="#4FD8E8"/>
      <line x1="0" y1="-8" x2="0" y2="-14" stroke="#E6EDF3" stroke-width="1"/>
      <circle cx="0" cy="-1" r="10" fill="none" stroke="#4FD8E8" stroke-width="0.75" opacity="0.5" filter="url(#soft)"/>
    </g>
    <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
      <mpath href="#satOrbit"/>
    </animateMotion>
  </g>
  <path id="satOrbit" d="M 60,50 A 330 330 0 0 1 390 380" fill="none" opacity="0"/>

  <!-- status indicator -->
  <g transform="translate(1080,258)">
    <circle r="4" fill="#3FE0A5"/>
    <circle r="4" fill="none" stroke="#3FE0A5" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="4;14;4" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="4" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#8CA0B3" letter-spacing="1">TRACKING</text>
  </g>

  <!-- title -->
  <text x="470" y="150" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="38" font-weight="700" fill="#E6EDF3" letter-spacing="2">SATELLITE HEALTH MONITOR</text>
  <text x="472" y="182" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" fill="#7C93A8" letter-spacing="0.5">TLE-based orbital decay risk prediction · XGBoost + SGP4</text>

  <!-- baseline rule -->
  <line x1="472" y1="204" x2="1150" y2="204" stroke="#1E3A52" stroke-width="1"/>
  <text x="472" y="228" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5B6B82" letter-spacing="1">SOURCE: CELESTRAK</text>
  <text x="650" y="228" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5B6B82" letter-spacing="1">MODEL: XGBOOST CLASSIFIER</text>
  <text x="900" y="228" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5B6B82" letter-spacing="1">OUTPUT: DECAY RISK %</text>
</svg>