<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Satellite Health Monitor banner">
  <defs>
    <radialGradient id="earthGlow" cx="30%" cy="70%" r="75%">
      <stop offset="0%" stop-color="#123049"/>
      <stop offset="55%" stop-color="#0C2233"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="80%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#0F1826"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="url(#bgGlow)"/>
  <g stroke="#17222F" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="220" x2="1200" y2="220"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="320"/><line x1="450" y1="0" x2="450" y2="320"/>
    <line x1="750" y1="0" x2="750" y2="320"/><line x1="1050" y1="0" x2="1050" y2="320"/>
  </g>
  <g fill="#4FD8E8">
    <circle cx="640" cy="70" r="2"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="710" cy="130" r="1.6"><animate attributeName="opacity" values="0.9;0.15;0.9" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="90" r="2.2"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/></circle>
  </g>
  <circle cx="60" cy="380" r="260" fill="url(#earthGlow)" stroke="#1E3A52" stroke-width="1.5"/>
  <circle cx="60" cy="380" r="260" fill="none" stroke="#4FD8E8" stroke-width="1" opacity="0.35"/>
  <text x="470" y="150" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="38" font-weight="700" fill="#E6EDF3" letter-spacing="2">SATELLITE HEALTH MONITOR</text>
  <text x="472" y="182" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" fill="#7C93A8" letter-spacing="0.5">TLE-based orbital decay risk prediction · XGBoost + SGP4</text>
  <line x1="472" y1="204" x2="1150" y2="204" stroke="#1E3A52" stroke-width="1"/>
  <text x="472" y="228" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5B6B82" letter-spacing="1">SOURCE: CELESTRAK</text>
